 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Smart Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #222;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      margin: 60px auto;
      max-width: 700px; /* 🟢 Tăng từ 420px → 700px */
      background: #ffffffee;
      border-radius: 25px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      padding: 50px 60px; /* 🟢 Tăng padding */
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s;
    }

    .container:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 35px rgba(0,0,0,0.3);
    }

    h1 {
      color: #333;
      font-size: 36px; /* 🟢 To hơn */
      margin-bottom: 40px;
    }

    .sensor-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f5f7ff;
      padding: 20px 30px; /* 🟢 To hơn */
      margin: 18px 0;
      border-radius: 16px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
      font-size: 22px;
    }

    .sensor-label {
      font-weight: 600;
      color: #333;
    }

    .sensor-value {
      color: #1b5e20;
      font-weight: bold;
      font-size: 24px;
    }

    .led-panel {
      margin-top: 40px;
    }

    .led-button {
      display: inline-block;
      width: 220px; /* 🟢 Tăng chiều rộng */
      padding: 18px 0; /* 🟢 Tăng chiều cao */
      margin: 15px;
      border: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25);
    }

    .on {
      background: linear-gradient(135deg, #00e676, #00c853);
    }

    .off {
      background: linear-gradient(135deg, #ff5252, #d50000);
    }

    .led-button:hover {
      transform: scale(1.07);
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }

    #settings {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      transition: 0.3s;
    }

    #settings:hover {
      background: #0056b3;
    }

    footer {
      margin-top: 30px;
      color: #eee;
      font-size: 16px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .mode-panel {
  margin-bottom: 25px;
}
.mode-button {
  margin: 10px;
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  background: #e0e0e0;
  transition: 0.3s;
}
.mode-button.active {
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: white;
}
.mode-button:hover {
  transform: scale(1.05);
}
.current-mode {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #e3f2fd;
  border-radius: 14px;
  padding: 18px 24px;
  margin: 25px auto;
  max-width: 400px;
  box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.05);
  font-family: 'Segoe UI', sans-serif;
  font-size: 22px;
  font-weight: 600;
  color: #333;
  transition: all 0.3s ease;
}

.mode-label {
  margin-right: 10px;
}

.mode-value {
  color: #1565c0;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.led-panel {
  display: none; /* Ẩn mặc định */
}

.led-panel.show {
  display: block; /* Hiện khi có class 'show' */
}
  </style>
</head>
<body>
  <button id="settings" onclick="window.location='/settings'">&#9881; Settings</button>

  <div class="container">
    <h1>🌡️ ESP32 Smart Dashboard</h1>

    <div class="sensor-card">
      <div class="sensor-label">Temperature</div>
      <div class="sensor-value"><span id="temp">loading...</span> °C</div>
    </div>

    <div class="sensor-card">
      <div class="sensor-label">Humidity</div>
      <div class="sensor-value"><span id="hum">loading...</span> %</div>
    </div>  
   
<div class="mode-panel">
  <button class="mode-button active" onclick="setMode(1)">🕹️ Mode 1: Manual</button>
  <button class="mode-button" onclick="setMode(2)">⚡ Mode 2: Blink</button>
  <button class="mode-button" onclick="setMode(3)">🌡️ Mode 3: PWM Temp</button>
</div>
    <div id="ledPanel" class="led-panel">
      <button id="led1Btn" class="led-button off" onclick="toggleLED(1)">💡 LED 1: OFF</button>
      <button id="led2Btn" class="led-button off" onclick="toggleLED(2)">💡 LED 2: OFF</button>
    </div>
  </div>

  <footer>© 2025 ESP32 IoT Dashboard</footer>

  <script>
    function toggleLED(id) {
      fetch(`/toggle?led=${id}`)
        .then(res => res.json())
        .then(data => {
          updateLED('led1Btn', data.led1);
          updateLED('led2Btn', data.led2);
        })
        .catch(err => console.error(err));
    }

    function updateLED(buttonId, state) {
      const btn = document.getElementById(buttonId);
      const ledNum = buttonId.includes('1') ? 1 : 2;

      if (state === 'ON') {
        btn.className = 'led-button on';
        btn.innerText = `💡 LED ${ledNum}: ON`;
      } else {
        btn.className = 'led-button off';
        btn.innerText = `💡 LED ${ledNum}: OFF`;
      }
    }

    function setMode(mode) {

      // mode = Number(mode);
      // const ledPanel = document.getElementById('ledPanel');
      
      //  if (mode === 1) {
      //   ledPanel.classList.add('show'); // Hiện đèn khi mode 1
      // } else {
      //   ledPanel.classList.remove('show'); // Ẩn khi mode 2 hoặc 3
      // }

      // const buttons = document.querySelectorAll('.mode-button');
      // buttons.forEach(b => b.classList.remove('active'));
      // buttons[mode - 1].classList.add('active');


  fetch(`/mode?set=${mode}`)
    .then(res => res.json())
    .then(data => {
      mode = Number(mode);
      const ledPanel = document.getElementById('ledPanel');
      
       if (mode === 1) {
        ledPanel.classList.add('show'); // Hiện đèn khi mode 1
      } else {
        ledPanel.classList.remove('show'); // Ẩn khi mode 2 hoặc 3
      }

      const buttons = document.querySelectorAll('.mode-button');
      buttons.forEach(b => b.classList.remove('active'));
      buttons[mode - 1].classList.add('active');
      console.log("Mode changed:", data.mode);

    })
    .catch(err => console.error(err));
}

    setInterval(() => {
      fetch('/sensors')
        .then(res => res.json())
        .then(data => {
          document.getElementById('temp').innerText = data.temp;
          document.getElementById('hum').innerText = data.hum;
        })
        .catch(err => console.error(err));
    }, 5000);

   
  </script>
</body>
</html>
